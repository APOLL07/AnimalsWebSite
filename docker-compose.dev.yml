services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fashionanimals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-fashionanimals}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fashionanimals}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploaded_media:/app/uploaded_media
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fashionanimals}:${POSTGRES_PASSWORD:-changeme_in_production}@postgres:5432/${POSTGRES_DB:-fashionanimals}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      APP_ENV: development
      APP_DEBUG: "true"
      BACKEND_CORS_ORIGINS: "http://localhost:5173,http://localhost"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fashionanimals}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./images:/usr/share/nginx/product-images:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploaded_media:
