services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploaded_media:/app/uploaded_media
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
      APP_ENV: development
      APP_DEBUG: "true"
      BACKEND_CORS_ORIGINS: "http://localhost:5173,http://localhost"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@fashionanimals}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./images:/usr/share/nginx/product-images:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploaded_media:
